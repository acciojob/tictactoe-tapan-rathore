<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->

	<div class="container">
        <h1>Tic Tac Toe</h1>
        <form id="form">
            <label for="player1">Player 1</label>
            <input type="text" id="player1" name="player1" placeholder="Enter Name" required>
            <br><br>
            <label for="player2">Player 2</label>
            <input type="text" id="player2" name="player2" placeholder="Enter Name" required>
            <br><br>
            <button id="submit">Start Game</button>
        </form>

        <div class="game">
            <div class="message">player1, you're up</div>
            <div class="board">
                <div class="cells" id="0"></div>
                <div class="cells" id="1"></div>
                <div class="cells" id="2"></div>
                <div class="cells" id="3"></div>
                <div class="cells" id="4"></div>
                <div class="cells" id="5"></div>
                <div class="cells" id="6"></div>
                <div class="cells" id="7"></div>
                <div class="cells" id="8"></div>
            </div>
            <button id="restart">Restart Game</button>
            <button id="newgame">New Game</button>
        </div>
    </div>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
